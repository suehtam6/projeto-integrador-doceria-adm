<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doceria-ADM</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/main.js" defer></script>
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="logo_da_loja" class="logo">
    </header>
    
    <main id="main">
        <div class="container-principal">
            <div class="card-informacao">
                <h3>Produtos cadastrados</h3>
                <span id="qtde-cadastrada" class="qtde-cadastrada">15</span>
            </div>
            <div class="card-informacao">
                <h3>Tipos de doce</h3>
                <span id="qtde-tipos" class="qtde-categoria">8</span>
            </div>
            <div class="card-informacao">
                <h3>Sabores</h3>
                <span id="qtde-sabores" class="qtde-sabor">9</span>
            </div>
        </div>

        <div class="pesquisa">
            <input type="search" id="doce-pesquisado" class="doce-pesquisado" placeholder="Pesquisar produto">
        </div>
        
        <div class="conteudo-layout">
            
            <div class="tabela-produtos">

                <div class="topo-tabela">
                    <h3>Produtos cadastrados</h3>
                    <button class="adicionar-produto">+ Adicionar produto</button>
                </div>

                <div class="tabela-itens">
                    <table class="descricao-tabela">
                        <thead>
                            <tr>
                                <th scope="col">imagem</th>
                                <th scope="col">Produto</th>
                                <th scope="col">Categoria</th>
                                <th scope="col">Preço</th>
                                <th scope="col">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="itens">
                                <td class="imagem-doce"><div class="placeholder-img"></div></td>
                                <td class="nome-produto">Bolo de chocolate</td>
                                <td class="categoria-td">Bolo</td>
                                <td class="preco">R$ 5,00</td>
                                <td class="btn">
                                    <button id="editar-doce"><img src="./img/lapis.png" alt="editar"></button>
                                    <button id="deletar-doce"><img src="./img/lixo.png" alt="deletar"></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="barra-lateral">
                
                <div class="card-gerenciar">
                    <h3>Gerenciar categoria</h3>
                    <button class="btn-adicionar-mini" id="adicionar-categoria">+ Adicionar categoria</button>
                    <ul class="lista-gerenciar">
                        <li>
                            <span>Bolo</span>
                            <div class="acoes-mini">
                                <button id="editar-categoria"><img src="./img/lapis.png" alt="editar"></button>
                                <button id="deletar-categoria"><img src="./img/lixo.png" alt="deletar"></button>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="card-gerenciar" id="card-sabor">
                    <h3>Gerenciar sabor</h3>
                    <button class="btn-adicionar-mini" id="adicionar-sabor">+ Adicionar sabor</button>
                    <ul class="lista-gerenciar">
                        <li>
                            <span>Chocolate</span>
                            <div class="acoes-mini">
                                <button id="editar-sabor"><img src="./img/lapis.png" alt="editar"></button>
                                <button id="deletar-sabor"><img src="./img/lixo.png" alt="deletar"></button>
                            </div>
                        </li>
                    </ul>
                </div>

            </div> </div> </main>
</body>
</html>
